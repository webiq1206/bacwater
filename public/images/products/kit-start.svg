<svg viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="800" fill="#f9f9f9"/>

  <!-- Outer box -->
  <rect x="200" y="200" width="400" height="320" rx="4" fill="#ffffff" stroke="#d4d4d8" stroke-width="1.5"/>
  <!-- Box top face -->
  <polygon points="200,200 240,165 640,165 600,200" fill="#fafafa" stroke="#d4d4d8" stroke-width="1"/>
  <!-- Box right face -->
  <polygon points="600,200 640,165 640,485 600,520" fill="#f5f5f5" stroke="#d4d4d8" stroke-width="1"/>

  <!-- Box label area -->
  <rect x="240" y="235" width="320" height="250" fill="#ffffff" stroke="#111111" stroke-width="0.75"/>

  <!-- Brand -->
  <text x="400" y="270" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" fill="#111111" font-weight="600" letter-spacing="1">BACwater &amp; Co.</text>
  <line x1="290" y1="284" x2="510" y2="284" stroke="#111111" stroke-width="0.5"/>

  <!-- Product name -->
  <text x="400" y="310" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#71717a" letter-spacing="3">RECONSTITUTION</text>
  <text x="400" y="326" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="24" fill="#111111">Starter Kit</text>

  <!-- Kit contents icons row -->
  <g transform="translate(280, 350)">
    <!-- Vial icon -->
    <rect x="0" y="0" width="22" height="40" rx="2" fill="#f0f8ff" stroke="#d4d4d8" stroke-width="0.75"/>
    <rect x="-1" y="-5" width="24" height="4" rx="1" fill="#e4e4e7"/>
    <rect x="1" y="-3" width="20" height="5" rx="1.5" fill="#52525b"/>
    <rect x="0.5" y="20" width="21" height="19" fill="#dbeafe" opacity="0.4"/>
    <text x="11" y="53" text-anchor="middle" font-family="Arial, sans-serif" font-size="5" fill="#a1a1aa">BAC Water</text>

    <!-- Syringe icon -->
    <g transform="translate(75, 8)">
      <rect x="0" y="0" width="50" height="6" rx="1.5" fill="#f5f5f5" stroke="#d4d4d8" stroke-width="0.75"/>
      <rect x="42" y="1" width="18" height="4" rx="1" fill="#e4e4e7"/>
      <rect x="57" y="-2" width="3" height="10" rx="1" fill="#d4d4d8"/>
      <line x1="0" y1="3" x2="-12" y2="3" stroke="#a1a1aa" stroke-width="0.5"/>
      <text x="25" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="5" fill="#a1a1aa">Syringes</text>
    </g>

    <!-- Alcohol pad icon -->
    <g transform="translate(170, 2)">
      <rect x="0" y="0" width="30" height="22" rx="2" fill="#f5f5f5" stroke="#d4d4d8" stroke-width="0.75"/>
      <text x="15" y="13" text-anchor="middle" font-family="Arial, sans-serif" font-size="4.5" fill="#a1a1aa">ALC</text>
      <text x="15" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="5" fill="#a1a1aa">Prep Pads</text>
    </g>
  </g>

  <!-- Divider -->
  <line x1="280" y1="420" x2="520" y2="420" stroke="#e4e4e7" stroke-width="0.5"/>

  <!-- Kit includes text -->
  <text x="400" y="440" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="6" fill="#71717a" letter-spacing="1.5">EVERYTHING YOU NEED TO GET STARTED</text>

  <!-- Contents list -->
  <text x="400" y="458" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="5.5" fill="#a1a1aa">1× BAC Water 30 mL  ·  10× Syringes  ·  10× Alcohol Pads</text>

  <!-- Premium badge -->
  <rect x="350" y="465" width="100" height="20" rx="2" fill="#111111"/>
  <text x="400" y="479" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="6.5" fill="#ffffff" letter-spacing="2">COMPLETE KIT</text>

  <!-- Bottom text -->
  <text x="400" y="575" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#111111" letter-spacing="1">Reconstitution Starter Kit</text>
  <text x="400" y="595" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#71717a" letter-spacing="1.5">ALL-IN-ONE BUNDLE</text>
</svg>