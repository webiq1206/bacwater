<svg viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="800" fill="#f9f9f9"/>

  <!-- Vial body -->
  <rect x="345" y="220" width="110" height="340" rx="6" fill="#f0f8ff" stroke="#d4d4d8" stroke-width="1.5"/>
  <!-- Water fill -->
  <rect x="346.5" y="340" width="107" height="218.5" rx="0 0 5 5" fill="#dbeafe" opacity="0.5"/>
  <!-- Vial neck -->
  <rect x="370" y="175" width="60" height="50" rx="3" fill="#f0f8ff" stroke="#d4d4d8" stroke-width="1.5"/>
  <!-- Rubber stopper -->
  <rect x="366" y="155" width="68" height="24" rx="4" fill="#52525b"/>
  <!-- Aluminum crimp -->
  <rect x="362" y="148" width="76" height="12" rx="3" fill="#e4e4e7"/>
  <circle cx="400" cy="152" r="6" fill="none" stroke="#a1a1aa" stroke-width="1"/>
  <!-- Crimp tabs -->
  <line x1="362" y1="160" x2="362" y2="170" stroke="#d4d4d8" stroke-width="1.5"/>
  <line x1="438" y1="160" x2="438" y2="170" stroke="#d4d4d8" stroke-width="1.5"/>

  <!-- Product label -->
  <rect x="355" y="270" width="90" height="140" fill="#ffffff" stroke="#111111" stroke-width="0.75"/>
  <!-- Brand name -->
  <text x="400" y="298" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#111111" font-weight="600" letter-spacing="0.5">BACWater</text>
  <text x="400" y="312" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="9" fill="#111111" font-style="italic">&amp; Co.</text>
  <!-- Divider -->
  <line x1="370" y1="322" x2="430" y2="322" stroke="#111111" stroke-width="0.5"/>
  <!-- Product type -->
  <text x="400" y="340" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="6.5" fill="#71717a" letter-spacing="2.5">BACTERIOSTATIC</text>
  <text x="400" y="352" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="6.5" fill="#71717a" letter-spacing="2.5">WATER</text>
  <!-- Volume -->
  <text x="400" y="380" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" fill="#111111">30 mL</text>
  <!-- Fine print -->
  <text x="400" y="400" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="5" fill="#a1a1aa" letter-spacing="1">STERILE  ·  USP GRADE</text>

  <!-- Reflection line -->
  <line x1="365" y1="230" x2="365" y2="540" stroke="#ffffff" stroke-width="2" opacity="0.6"/>

  <!-- Bottom text -->
  <text x="400" y="620" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#111111" letter-spacing="1">Bacteriostatic Water</text>
  <text x="400" y="640" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#71717a" letter-spacing="1.5">30 mL VIAL</text>
</svg>