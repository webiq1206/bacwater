<svg viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="800" fill="#f9f9f9"/>

  <!-- Box body -->
  <rect x="220" y="230" width="360" height="280" rx="4" fill="#ffffff" stroke="#d4d4d8" stroke-width="1.5"/>
  <!-- Box top face -->
  <polygon points="220,230 260,195 620,195 580,230" fill="#fafafa" stroke="#d4d4d8" stroke-width="1"/>
  <!-- Box right face -->
  <polygon points="580,230 620,195 620,475 580,510" fill="#f5f5f5" stroke="#d4d4d8" stroke-width="1"/>

  <!-- Box label area -->
  <rect x="260" y="270" width="280" height="200" fill="#ffffff" stroke="#111111" stroke-width="0.75"/>

  <!-- Brand -->
  <text x="400" y="305" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="16" fill="#111111" font-weight="600" letter-spacing="1">BACWater &amp; Co.</text>
  <line x1="300" y1="318" x2="500" y2="318" stroke="#111111" stroke-width="0.5"/>

  <!-- Product name -->
  <text x="400" y="342" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#71717a" letter-spacing="3">INSULIN SYRINGES</text>
  <text x="400" y="375" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="28" fill="#111111">0.5 mL</text>
  <text x="400" y="395" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#71717a" letter-spacing="2">50 UNITS  ·  30G × 5/16"</text>

  <!-- Count badge -->
  <rect x="360" y="415" width="80" height="26" rx="2" fill="#111111"/>
  <text x="400" y="433" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffffff" letter-spacing="2">100 COUNT</text>

  <!-- Fine print -->
  <text x="400" y="460" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="5" fill="#a1a1aa" letter-spacing="1">STERILE  ·  SINGLE USE  ·  LATEX FREE</text>

  <!-- Syringe illustration -->
  <g transform="translate(615, 310) rotate(15)">
    <rect x="0" y="-3.5" width="60" height="7" rx="2" fill="#f5f5f5" stroke="#d4d4d8" stroke-width="0.75"/>
    <rect x="52" y="-2.5" width="25" height="5" rx="1" fill="#e4e4e7"/>
    <rect x="74" y="-5" width="3.5" height="10" rx="1" fill="#d4d4d8"/>
    <line x1="0" y1="0" x2="-20" y2="0" stroke="#a1a1aa" stroke-width="0.75"/>
    <rect x="-24" y="-2.5" width="7" height="5" rx="1" fill="#f97316" opacity="0.6"/>
    <line x1="12" y1="-3.5" x2="12" y2="-0.5" stroke="#d4d4d8" stroke-width="0.4"/>
    <line x1="24" y1="-3.5" x2="24" y2="0" stroke="#d4d4d8" stroke-width="0.5"/>
    <line x1="36" y1="-3.5" x2="36" y2="-0.5" stroke="#d4d4d8" stroke-width="0.4"/>
    <line x1="48" y1="-3.5" x2="48" y2="0" stroke="#d4d4d8" stroke-width="0.5"/>
  </g>

  <!-- Bottom text -->
  <text x="400" y="575" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#111111" letter-spacing="1">Insulin Syringes</text>
  <text x="400" y="595" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#71717a" letter-spacing="1.5">0.5 mL / 50u  ·  100 PACK</text>
</svg>